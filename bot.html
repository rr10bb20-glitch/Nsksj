<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 البوت الشخصي</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0306;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e8dac8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .chat-card {
      width: 100%;
      max-width: 550px;
      background: rgba(20, 8, 12, 0.96);
      border-radius: 28px;
      border: 1px solid #3d1525;
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, #1a0810, #0d0308);
      padding: 18px 20px;
      border-bottom: 1px solid #3d1525;
      text-align: center;
    }
    .chat-header h1 {
      font-size: 24px;
      color: #ff3065;
    }
    .chat-header p {
      font-size: 12px;
      color: #907868;
    }
    .chat-messages {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 85%;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 15px;
    }
    .user-message {
      background: linear-gradient(135deg, #d42050, #b01040);
      color: white;
      align-self: flex-end;
    }
    .bot-message {
      background: rgba(40, 15, 25, 0.8);
      border: 1px solid #3d1525;
      align-self: flex-start;
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: #0d0308;
      border-top: 1px solid #3d1525;
    }
    .input-area input {
      flex: 1;
      background: #1a0810;
      border: 1px solid #3d1525;
      color: #e8dac8;
      padding: 12px 16px;
      border-radius: 40px;
      font-size: 15px;
      outline: none;
    }
    .input-area input:focus {
      border-color: #d42050;
    }
    .input-area button {
      background: #d42050;
      color: white;
      border: none;
      padding: 0 24px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
    }
    .input-area button:hover {
      background: #ff3065;
    }
  </style>
</head>
<body>

<div class="chat-card">
  <div class="chat-header">
    <h1>🤖 البوت الشخصي</h1>
    <p>🔓 بدون قيود | بدون رقابة</p>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message bot-message">👻 مرحباً! أنا البوت الشخصي. اسألني أي شيء بدون قيود.</div>
  </div>

  <div class="input-area">
    <input type="text" id="questionInput" placeholder="اكتب سؤالك هنا...">
    <button id="sendBtn">إرسال</button>
  </div>
</div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const questionInput = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(text, isUser) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
    messageDiv.textContent = text;
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot-message';
    typingDiv.id = 'typingIndicator';
    typingDiv.textContent = '🤔 جاري التفكير...';
    chatMessages.appendChild(typingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
  }

  async function askBot(question) {
    try {
      const response = await fetch('/api/bot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question })
      });
      const data = await response.json();
      return data.answer || '⚠️ لم أتلقَ رداً.';
    } catch (error) {
      return '❌ خطأ في الاتصال.';
    }
  }

  async function handleSend() {
    const question = questionInput.value.trim();
    if (!question) return;

    addMessage(question, true);
    questionInput.value = '';
    showTyping();

    const reply = await askBot(question);
    removeTyping();
    addMessage(reply, false);
  }

  sendBtn.addEventListener('click', handleSend);
  questionInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleSend();
  });
</script>

</body>
</html>
